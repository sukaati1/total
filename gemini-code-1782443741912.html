<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Penghitung Total</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        input { margin: 5px; padding: 8px; }
        button { padding: 8px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        h3 { color: #333; }
    </style>
</head>
<body>

    <h2>Kalkulator Hitung Total</h2>
    
    <label>Angka Pertama:</label><br>
    <input type="number" id="angka1" placeholder="Masukkan angka"><br>
    
    <label>Angka Kedua:</label><br>
    <input type="number" id="angka2" placeholder="Masukkan angka"><br><br>
    
    <button onclick="hitungTotal()">Hitung Total</button>

    <h3>Hasil: <span id="hasil">0</span></h3>

    <script>
        function hitungTotal() {
            // Mengambil nilai dari input
            let a = parseFloat(document.getElementById('angka1').value) || 0;
            let b = parseFloat(document.getElementById('angka2').value) || 0;
            
            // Rumus Utama
            let total = a + b;
            
            // Menampilkan hasil ke layar
            document.getElementById('hasil').innerText = total;
        }
    </script>

</body>
</html>
