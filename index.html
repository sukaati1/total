<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumus flop</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(rgba(10, 10, 15, 0.82), rgba(25, 10, 0, 0.92)), 
                        url('https://images7.alphacoders.com/132/1327110.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(15, 15, 22, 0.82);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 69, 0, 0.35);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.85), 0 0 25px rgba(255, 69, 0, 0.2);
            width: 100%;
            max-width: 950px;
            padding: 30px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #ff4500;
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.6);
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffa500;
            font-size: 14px;
            letter-spacing: 0.7px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: rgba(8, 8, 10, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            color: #fff;
            padding: 15px;
            box-sizing: border-box;
            resize: vertical;
            font-family: 'Courier New', monospace;
            font-size: 13.5px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        textarea:focus {
            border-color: #ff4500;
            outline: none;
            box-shadow: 0 0 12px rgba(255, 69, 0, 0.4);
            background: rgba(5, 5, 5, 0.95);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        button {
            flex: 1;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        .btn-submit { 
            background: linear-gradient(135deg, #22c55e, #16a34a); /* Hijau Kukus */
            color: #fff; 
        }
        .btn-submit:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(34, 197, 94, 0.45); 
        }
        .btn-copy { 
            background: linear-gradient(135deg, #0284c7, #0ea5e9); /* Biru Langit */
            color: #fff; 
        }
        .btn-copy:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(14, 165, 233, 0.45); 
        }
        .btn-reset { 
            background: linear-gradient(135deg, #dc2626, #991b1b); /* Merah Darah */
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }
        .btn-reset:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(220, 38, 38, 0.45);
        }
        button:active {
            transform: translateY(1px);
        }
        .table-container { 
            overflow-x: auto; 
            margin-top: 5px; 
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(12, 12, 15, 0.75);
        }
        th, td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 18px;
            text-align: left;
            font-size: 13.5px;
        }
        th { 
            background-color: rgba(20, 20, 24, 0.95); 
            color: #ff4500; 
            font-weight: 700; 
            letter-spacing: 0.8px; 
        }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: rgba(255, 69, 0, 0.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>Rumus flop</h1>
    
    <label for="rawInput">Tempel log transaksi mentah disini:</label>
    <textarea id="rawInput" placeholder="Tempel log di sini..."></textarea>
    
    <div class="btn-group">
        <button class="btn-submit" onclick="konversiLog()">Submit</button>
        <button class="btn-copy" onclick="salinHasil()">Salin Data</button>
        <button class="btn-reset" onclick="resetData()">Reset
