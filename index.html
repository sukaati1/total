<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumus flop</title>
<style>
body {
font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), #000000;
color: #f3f4f6;
margin: 0;
padding: 20px;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}
.container {
background: rgba(15, 15, 22, 0.92);
backdrop-filter: blur(15px);
-webkit-backdrop-filter: blur(15px);
border: 1px solid rgba(0, 170, 255, 0.35);
border-radius: 16px;
box-shadow: 0 20px 40px rgba(0, 0, 0, 0.85), 0 0 25px rgba(0, 170, 255, 0.2);
width: 100%;
max-width: 950px;
padding: 30px;
box-sizing: border-box;
}
h1 {
text-align: center;
color: #00aaff;
font-size: 28px;
font-weight: 800;
text-transform: uppercase;
letter-spacing: 4px;
margin-bottom: 30px;
text-shadow: 0 0 15px rgba(0, 170, 255, 0.6);
}
label {
display: block;
font-weight: 600;
margin-bottom: 10px;
color: #3b82f6;
font-size: 14px;
letter-spacing: 0.7px;
}
textarea {
width: 100%;
height: 150px;
background: rgba(8, 8, 10, 0.85);
border: 1px solid rgba(255, 255, 255, 0.12);
border-radius: 10px;
color: #fff;
padding: 15px;
box-sizing: border-box;
resize: vertical;
font-family: 'Courier New', monospace;
font-size: 13.5px;
margin-bottom: 25px;
transition: all 0.3s ease;
}
textarea:focus {
border-color: #00aaff;
outline: none;
box-shadow: 0 0 12px rgba(0, 170, 255, 0.4);
background: rgba(5, 5, 5, 0.95);
}
.btn-group {
display: flex;
gap: 15px;
margin-bottom: 30px;
}
button {
flex: 1;
padding: 14px 20px;
font-size: 14px;
font-weight: 700;
border: none;
border-radius: 10px;
cursor: pointer;
transition: all 0.2s ease;
text-transform: uppercase;
letter-spacing: 1.2px;
}
.btn-submit {
background: linear-gradient(135deg, #0066ff, #00aaff);
color: #fff;
}
.btn-submit:hover {
transform: translateY(-2px);
box-shadow: 0 6px 15px rgba(0, 170, 255, 0.45);
}
.btn-copy {
background: linear-gradient(135deg, #1e40af, #3b82f6);
color: #fff;
}
.btn-copy:hover {
transform: translateY(-2px);
box-shadow: 0 6px 15px rgba(59, 130, 246, 0.45);
}
.btn-reset {
background: rgba(255, 255, 255, 0.08);
color: #d1d5db;
border: 1px solid rgba(255, 255, 255, 0.15);
}
.btn-reset:hover {
background: rgba(255, 255, 255, 0.18);
color: #fff;
}
button:active {
transform: translateY(1px);
}
.table-container {
overflow-x: auto;
margin-top: 5px;
border-radius: 10px;
border: 1px solid rgba(255, 255, 255, 0.08);
}
table {
width: 100%;
border-collapse: collapse;
background: rgba(12, 12, 15, 0.75);
}
th, td {
border-bottom: 1px solid rgba(255, 255, 255, 0.08);
padding: 14px 18px;
text-align: left;
font-size: 13.5px;
}
th {
background-color: rgba(20, 20, 24, 0.95);
color: #00aaff;
font-weight: 700;
letter-spacing: 0.8px;
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) { background-color: rgba(0, 170, 255, 0.02); }
</style>
</head>
<body>

<div class="container">
<h1>Rumus flop</h1>

<label for="rawInput">Tempel log transaksi mentah disini:</label>
<textarea id="rawInput" placeholder="Tempel log di sini..."></textarea>

<div class="btn-group">
<button class="btn-submit" onclick="konversiLog()">Submit</button>
<button class="btn-copy" onclick="salinHasil()">Salin Data</button>
<button class="btn-reset" onclick="resetData()">Reset</button>
</div>

<label>Hasil Konversi:</label>
<div class="table-container">
<table id="resultTable">
<thead>
<tr>
<th>WAKTU</th>
<th>Used ID</th>
<th>Tujuan Bank</th>
<th>Credit</th>
<th>Jumlah</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<script>
let hasilTeksUntukDisalin = "";

function konversiLog() {
const input = document.getElementById('rawInput').value.trim();
const tbody = document.getElementById('tableBody');
tbody.innerHTML = '';
hasilTeksUntukDisalin = "";

if (!input) {
alert('Silakan tempel log transaksi terlebih dahulu!');
return;
}

let baris = input.split('\n');
baris.reverse();

let barisDataDisalin = [];

baris.forEach(line => {
if (line.trim() === '') return;

// Memisahkan kolom berdasarkan tab atau spasi (minimal 2 spasi)
const kolom = line.split(/\t| {2,}/);

// Catatan: Pastikan log mentah memiliki setidaknya 7 kolom terpisah
if (kolom.length >= 7) {
const fullDateTime = kolom[1];
const waktu = fullDateTime.includes(' ') ? fullDateTime.split(' ')[1] : fullDateTime;
const userId = kolom[2];
const tujuanBank = kolom[4];
const creditStatus = "";
const jumlah = kolom[6];

const tr = document.createElement('tr');
tr.innerHTML = `<td>${waktu}</td><td>${userId}</td><td>${tujuanBank}</td><td>${creditStatus}</td><td>${jumlah}</td>`;
tbody.appendChild(tr);

barisDataDisalin.push(`${waktu}\t${userId}\t${tujuanBank}\t${creditStatus}\t${jumlah}`);
}
});

if (barisDataDisalin.length === 0) {
    alert('Format log tidak sesuai atau jumlah kolom kurang dari 7. Pastikan menggunakan tab/spasi ganda antar kolom.');
} else {
    hasilTeksUntukDisalin = barisDataDisalin.join('\n');
}
}

function resetData() {
document.getElementById('rawInput').value = '';
document.getElementById('tableBody').innerHTML = '';
hasilTeksUntukDisalin = "";
}

function salinHasil() {
if (!hasilTeksUntukDisalin) {
alert('Belum ada data yang dikonversi untuk disalin!');
return;
}
navigator.clipboard.writeText(hasilTeksUntukDisalin).then(() => {
    alert('Data berhasil disalin ke clipboard!');
}).catch(err => {
    alert('Gagal menyalin data otomatis, izinkan akses clipboard atau salin manual.');
});
}
</script>
</body>
</html>
